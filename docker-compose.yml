services:
  hermes:
    build: .
    image: hermes-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
    command: ["dashboard", "--host", "127.0.0.1", "--no-open"]

volumes:
  hermes-data:
